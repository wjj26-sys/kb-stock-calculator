<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KB Stock Calculator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <template id="cardInputTemplate">
    <div class="card-input-box">
      <div class="card-input-head">
        <strong class="card-input-title">카드 1</strong>
        <button type="button" class="delete-card-btn">삭제</button>
      </div>

      <label>주식명</label>
      <input class="stock-name-input" type="text" value="케이뱅크" />

      <div class="grid-2">
        <div>
          <label>진입가</label>
          <input class="buy-price-input num-input" type="number" value="7890" />
        </div>
        <div>
          <label>매도가</label>
          <input class="sell-price-input num-input" type="number" value="7890" />
        </div>
      </div>

      <div class="grid-2">
        <div>
          <label>수량(주)</label>
          <input class="qty-input num-input" type="number" value="1" />
        </div>
        <div>
          <label>현금 표시</label>
          <input class="cash-type-input" type="text" value="현금" />
        </div>
      </div>
    </div>
  </template>

  <div class="app-wrap">
    <aside class="side-panel">
      <h1>KB 주식 계산기</h1>

      <p class="sub">
        입력값을 바꾸면 상단/카드 계산이 같이 바뀌고,<br />
        카드 레이어 전체는 폰 안에서 위아래로 움직여.
      </p>

      <section class="panel-box">
        <h2>상단 정보</h2>

        <label>종합위탁 번호</label>
        <input id="accountInput" type="text" value="339-097-823 01" />

        <label>이름</label>
        <input id="nameInput" type="text" value="이부용" />

        <label>초기 예수금</label>
        <input id="depositInput" class="num-input" type="number" value="12735" />

        <label>당일실현손익</label>
        <input id="realizedInput" class="num-input" type="number" value="0" />
      </section>

      <section class="panel-box">
        <div class="panel-head">
          <h2>카드 입력</h2>
        </div>

        <div id="cardInputs"></div>

        <div class="btn-row">
          <button id="addCardBtn" class="btn btn-dark" type="button">카드 추가</button>
          <button id="demoBtn" class="btn btn-light" type="button">예시값</button>
          <button id="captureBtn" class="btn btn-light" type="button">스샷 저장</button>
        </div>
      </section>

      <section class="panel-box guide-box">
        <h2>수정 포인트</h2>
        <ul>
          <li><b>style.css</b> → 위치, 크기, 색, 그림자</li>
          <li><b>app.js / UI</b> → 드래그 범위, 카드 간격, 좌표</li>
          <li><b>app.js / ASSETS</b> → 이미지 파일명</li>
          <li><b>app.js / TOP_TEXT_POS, CARD_TEXT_POS</b> → 텍스트 위치</li>
          <li><b>app.js / calcStock, calcSummary</b> → 계산식</li>
        </ul>
      </section>
    </aside>

    <main class="preview-area">
      <div class="phone" id="captureArea">
        <!-- 1. 배경 -->
        <img
          class="layer white-bg"
          src="./assets/white-bg.png"
          alt="white background"
          draggable="false"
        />

        <!-- 2. 카드 -->
        <div class="card-viewport" id="cardViewport">
          <div class="card-track" id="cardTrack"></div>
        </div>

        <!-- 3. 상단 UI -->
        <img
          class="layer top-fixed"
          src="./assets/top-fixed-ui-image.png"
          alt="top fixed ui"
          draggable="false"
        />

        <!-- 4. 상단 텍스트 -->
        <div class="top-text-layer" id="topTextLayer">
          <div id="accountText" class="top-text top-account">
            <span class="account-number"></span>
            <span class="account-name"></span>
          </div>

          <div id="assetText" class="top-text top-asset num-text"></div>
          <div id="assetRateText" class="top-text top-asset-rate num-text"></div>
          <div id="totalPnLText" class="top-text top-total-pnl num-text"></div>
          <div id="totalEvalText" class="top-text top-total-eval num-text"></div>
          <div id="d2Text" class="top-text top-d2 num-text"></div>
          <div id="buyText" class="top-text top-buy num-text"></div>
          <div id="realizedText" class="top-text top-realized num-text"></div>
        </div>

        <!-- 해외 버튼 -->
        <div class="overseas-btn-wrap">
          <img
            class="overseas-btn-img"
            src="./assets/overseas-btn.png"
            alt="overseas button"
            draggable="false"
          />
        </div>

        <!-- 5. 메뉴 드래그 -->
        <div class="menu-move-viewport" id="menuMoveViewport">
          <img
            id="menuMoveImage"
            class="menu-move-image"
            src="./assets/menu-moving-image.png"
            alt="menu moving image"
            draggable="false"
          />
        </div>

        <!-- 6. 메뉴 프레임 -->
        <img
          class="menu-frame"
          src="./assets/menu-fram.png"
          alt="menu frame"
          draggable="false"
        />
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
